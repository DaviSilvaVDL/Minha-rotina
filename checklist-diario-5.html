<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist Diário</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c;
    --surface: #1a1916;
    --surface2: #201f1c;
    --border: #2e2c28;
    --rec: #c0392b;
    --rec-soft: rgba(192,57,43,0.15);
    --agr: #27ae60;
    --agr-soft: rgba(39,174,96,0.15);
    --text: #e8e4dc;
    --muted: #7a756b;
    --gold: #c9a84c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 2rem 1rem 5rem;
  }

  /* ABAS */
  .tabs {
    display: flex;
    gap: 0.5rem;
    max-width: 820px;
    margin: 0 auto 2rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0;
  }

  .tab-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    padding: 0.6rem 1.2rem;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.2s;
    letter-spacing: 0.03em;
  }

  .tab-btn.active {
    color: var(--text);
    border-bottom-color: var(--gold);
  }

  .tab-btn:hover:not(.active) { color: var(--text); }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* HEADER */
  header { text-align: center; margin-bottom: 2.5rem; }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 6vw, 3rem);
    font-weight: 700;
    color: var(--text);
  }

  #date-display {
    font-size: 0.82rem;
    color: var(--muted);
    margin-top: 0.4rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .container { max-width: 820px; margin: 0 auto; }

  .columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.2rem;
  }

  @media (max-width: 600px) { .columns { grid-template-columns: 1fr; } }

  .col-header {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 1rem 1.1rem;
    border-radius: 12px 12px 0 0;
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    font-weight: 700;
  }

  .col-header.rec { background: var(--rec-soft); border: 1px solid rgba(192,57,43,0.3); color: #e05c4a; }
  .col-header.agr { background: var(--agr-soft); border: 1px solid rgba(39,174,96,0.3); color: #3ecf79; }

  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .rec .dot { background: var(--rec); }
  .agr .dot { background: var(--agr); }

  .col-count { margin-left: auto; font-size: 1.4rem; font-weight: 700; }

  .col-body {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 12px 12px;
    padding: 0.6rem;
    min-height: 180px;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .entry {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.45rem 0.6rem;
    border-radius: 8px;
    background: rgba(255,255,255,0.03);
    border: 1px solid transparent;
    animation: slideIn 0.2s ease;
    transition: border-color 0.15s;
  }

  .entry:focus-within { border-color: var(--border); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-5px); }
    to   { opacity: 1; transform: none; }
  }

  .entry-num { font-family: 'Playfair Display', serif; font-size: 0.8rem; color: var(--muted); min-width: 18px; flex-shrink: 0; }
  .entry-time { font-size: 0.75rem; color: var(--muted); white-space: nowrap; flex-shrink: 0; }
  .divider { width: 1px; height: 16px; background: var(--border); flex-shrink: 0; }

  .entry-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    color: var(--text);
    min-width: 0;
    padding: 0;
  }

  .entry-input::placeholder { color: var(--muted); opacity: 0.6; }

  .entry-del {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 1.1rem; opacity: 0; transition: opacity 0.15s, color 0.15s;
    padding: 0 2px; line-height: 1; flex-shrink: 0;
  }

  .entry:hover .entry-del { opacity: 1; }
  .entry-del:hover { color: #e05c4a; }

  .add-btn {
    width: 100%; padding: 1rem; margin-top: 0.8rem;
    border-radius: 12px; border: none;
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem; font-weight: 700;
    cursor: pointer; transition: transform 0.1s, filter 0.2s;
  }

  .add-btn:active { transform: scale(0.97); }
  .add-btn.rec { background: var(--rec); color: #fff; }
  .add-btn.agr { background: var(--agr); color: #fff; }
  .add-btn:hover { filter: brightness(1.15); }

  .empty-msg { color: var(--muted); font-size: 0.8rem; text-align: center; padding: 1.5rem 0 0.5rem; opacity: 0.6; }

  /* Resumo */
  .summary { margin-top: 2rem; display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }

  .summary-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 1rem 2rem; text-align: center; min-width: 140px;
  }

  .summary-card .num { font-family: 'Playfair Display', serif; font-size: 2.4rem; font-weight: 700; line-height: 1; }
  .summary-card.s-rec .num { color: var(--rec); }
  .summary-card.s-agr .num { color: var(--agr); }
  .summary-card .label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 0.4rem; }

  /* Botões de ação */
  .action-row {
    display: flex; gap: 0.8rem; justify-content: center;
    margin-top: 1.8rem; flex-wrap: wrap;
  }

  .save-btn {
    background: var(--gold); color: #0f0e0c;
    border: none; font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem; font-weight: 700;
    padding: 0.65rem 1.6rem; border-radius: 8px;
    cursor: pointer; transition: filter 0.2s;
    letter-spacing: 0.04em;
  }

  .save-btn:hover { filter: brightness(1.1); }

  .reset-btn {
    background: none; border: 1px solid var(--border);
    color: var(--muted); font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem; padding: 0.65rem 1.4rem;
    border-radius: 8px; cursor: pointer;
    letter-spacing: 0.06em; transition: all 0.2s;
  }

  .reset-btn:hover { border-color: #e05c4a; color: #e05c4a; }

  /* Toast */
  .toast {
    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
    background: var(--gold); color: #0f0e0c;
    padding: 0.7rem 1.6rem; border-radius: 30px;
    font-weight: 700; font-size: 0.85rem;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
    z-index: 999;
  }

  .toast.show { opacity: 1; }

  /* ===== HISTÓRICO ===== */
  #panel-history h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem; margin-bottom: 1.5rem; color: var(--text);
  }

  .history-empty {
    color: var(--muted); text-align: center;
    padding: 3rem 1rem; font-size: 0.9rem;
  }

  .history-day {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 1rem;
    overflow: hidden;
  }

  .history-day-header {
    display: flex; align-items: center; gap: 0.8rem;
    padding: 0.9rem 1.1rem;
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
  }

  .history-day-header:hover { background: rgba(255,255,255,0.03); }

  .history-day-date {
    font-family: 'Playfair Display', serif;
    font-size: 1rem; font-weight: 700; flex: 1;
  }

  .history-badges { display: flex; gap: 0.5rem; }

  .badge {
    font-size: 0.75rem; font-weight: 700;
    padding: 0.2rem 0.6rem; border-radius: 20px;
  }

  .badge.rec { background: var(--rec-soft); color: #e05c4a; }
  .badge.agr { background: var(--agr-soft); color: #3ecf79; }

  .chevron {
    color: var(--muted); font-size: 0.85rem;
    transition: transform 0.2s;
  }

  .history-day.open .chevron { transform: rotate(180deg); }

  .history-day-body {
    display: none;
    padding: 0 1rem 1rem;
    border-top: 1px solid var(--border);
  }

  .history-day.open .history-day-body { display: block; }

  .history-cols {
    display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 0.8rem;
  }

  @media (max-width: 500px) { .history-cols { grid-template-columns: 1fr; } }

  .history-col-title {
    font-size: 0.78rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.1em;
    margin-bottom: 0.5rem;
  }

  .history-col-title.rec { color: #e05c4a; }
  .history-col-title.agr { color: #3ecf79; }

  .history-entry {
    font-size: 0.82rem; color: var(--muted);
    padding: 0.3rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    display: flex; gap: 0.5rem;
  }

  .history-entry:last-child { border-bottom: none; }

  .history-entry .h-time { white-space: nowrap; flex-shrink: 0; }
  .history-entry .h-text { color: var(--text); }

  .del-day-btn {
    background: none; border: 1px solid var(--border);
    color: var(--muted); font-size: 0.72rem;
    padding: 0.3rem 0.8rem; border-radius: 5px;
    cursor: pointer; transition: all 0.2s;
    margin-top: 0.8rem;
  }

  .del-day-btn:hover { border-color: #e05c4a; color: #e05c4a; }
</style>
</head>
<body>

<div style="max-width:820px;margin:0 auto;">
  <header>
    <h1>Checklist Diário</h1>
    <div id="date-display"></div>
  </header>

  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('today')">📋 Hoje</button>
    <button class="tab-btn" onclick="showTab('history')">📅 Histórico</button>
  </div>
</div>

<!-- ABA HOJE -->
<div id="panel-today" class="tab-panel active">
  <div class="container">
    <div class="columns">

      <div>
        <div class="col-header rec">
          <span class="dot"></span>
          Reclamei
          <span class="col-count" id="count-rec">0</span>
        </div>
        <div class="col-body" id="list-rec">
          <div class="empty-msg" id="empty-rec">Nenhuma ocorrência ainda</div>
        </div>
        <button class="add-btn rec" onclick="addEntry('rec')">+ Reclamei</button>
      </div>

      <div>
        <div class="col-header agr">
          <span class="dot"></span>
          Agradeci
          <span class="col-count" id="count-agr">0</span>
        </div>
        <div class="col-body" id="list-agr">
          <div class="empty-msg" id="empty-agr">Nenhuma ocorrência ainda</div>
        </div>
        <button class="add-btn agr" onclick="addEntry('agr')">+ Agradeci</button>
      </div>

    </div>

    <div class="summary">
      <div class="summary-card s-rec">
        <div class="num" id="total-rec">0</div>
        <div class="label">Vezes reclamei</div>
      </div>
      <div class="summary-card s-agr">
        <div class="num" id="total-agr">0</div>
        <div class="label">Vezes agradeci</div>
      </div>
    </div>

    <div class="action-row">
      <button class="save-btn" onclick="saveDay()">💾 Salvar dia no histórico</button>
      <button class="reset-btn" onclick="resetDay()">↺ Resetar o dia</button>
    </div>
  </div>
</div>

<!-- ABA HISTÓRICO -->
<div id="panel-history" class="tab-panel">
  <div class="container">
    <h2>Seu Histórico</h2>
    <div id="history-list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ---- DATA ----
  const todayKey = new Date().toISOString().slice(0,10);
  const TODAY_KEY = 'today_' + todayKey;
  const HISTORY_KEY = 'checklist_history';

  const todayDate = new Date();
  document.getElementById('date-display').textContent =
    todayDate.toLocaleDateString('pt-BR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

  let state = JSON.parse(localStorage.getItem(TODAY_KEY) || 'null') || { rec: [], agr: [] };
  let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');

  function saveState() { localStorage.setItem(TODAY_KEY, JSON.stringify(state)); }
  function saveHistory() { localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); }

  function nowTime() {
    return new Date().toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  }

  // ---- TOAST ----
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ---- TABS ----
  function showTab(tab) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('panel-' + tab).classList.add('active');
    event.target.classList.add('active');
    if (tab === 'history') renderHistory();
  }

  // ---- HOJE ----
  function addEntry(col) {
    const id = Date.now();
    state[col].push({ time: nowTime(), id, text: '' });
    saveState();
    render();
    setTimeout(() => {
      const input = document.querySelector(`[data-id="${id}"]`);
      if (input) input.focus();
    }, 50);
  }

  function updateText(col, id, val) {
    const item = state[col].find(e => e.id === id);
    if (item) { item.text = val; saveState(); }
  }

  function delEntry(col, id) {
    state[col] = state[col].filter(e => e.id !== id);
    saveState();
    render();
  }

  function render() {
    ['rec','agr'].forEach(col => {
      const list = document.getElementById('list-' + col);
      const empty = document.getElementById('empty-' + col);
      const entries = state[col];

      Array.from(list.querySelectorAll('.entry')).forEach(e => e.remove());

      if (entries.length === 0) {
        empty.style.display = 'block';
      } else {
        empty.style.display = 'none';
        entries.forEach((e, i) => {
          const div = document.createElement('div');
          div.className = 'entry';
          div.innerHTML = `
            <span class="entry-num">${i + 1}.</span>
            <span class="entry-time">⏱ ${e.time}</span>
            <div class="divider"></div>
            <input class="entry-input" type="text" placeholder="O que foi?"
              value="${e.text.replace(/"/g,'&quot;')}"
              data-id="${e.id}"
              oninput="updateText('${col}', ${e.id}, this.value)" />
            <button class="entry-del" onclick="delEntry('${col}', ${e.id})">×</button>
          `;
          list.appendChild(div);
        });
      }

      document.getElementById('count-' + col).textContent = entries.length;
      document.getElementById('total-' + col).textContent = entries.length;
    });
  }

  // ---- SALVAR DIA ----
  function saveDay() {
    if (state.rec.length === 0 && state.agr.length === 0) {
      showToast('Nenhum registro para salvar!');
      return;
    }

    // Remove entrada do mesmo dia se já existir
    history = history.filter(d => d.dateKey !== todayKey);

    history.unshift({
      dateKey: todayKey,
      dateLabel: todayDate.toLocaleDateString('pt-BR', { weekday:'long', day:'numeric', month:'long', year:'numeric' }),
      rec: JSON.parse(JSON.stringify(state.rec)),
      agr: JSON.parse(JSON.stringify(state.agr)),
      savedAt: nowTime()
    });

    saveHistory();
    showToast('✅ Dia salvo no histórico!');
  }

  function resetDay() {
    if (!confirm('Resetar todos os registros de hoje?')) return;
    state = { rec: [], agr: [] };
    saveState();
    render();
  }

  // ---- HISTÓRICO ----
  function renderHistory() {
    const el = document.getElementById('history-list');
    el.innerHTML = '';

    if (history.length === 0) {
      el.innerHTML = '<div class="history-empty">Nenhum dia salvo ainda.<br>Use o botão <strong>"Salvar dia no histórico"</strong> na aba Hoje.</div>';
      return;
    }

    history.forEach((day, idx) => {
      const div = document.createElement('div');
      div.className = 'history-day';
      div.id = 'hday-' + idx;

      const recRows = day.rec.map(e =>
        `<div class="history-entry">
          <span class="h-time">⏱ ${e.time}</span>
          <span class="h-text">${e.text || '<em style="opacity:0.4">sem descrição</em>'}</span>
        </div>`
      ).join('') || '<div style="color:var(--muted);font-size:0.8rem;padding:0.3rem 0">Nenhuma</div>';

      const agrRows = day.agr.map(e =>
        `<div class="history-entry">
          <span class="h-time">⏱ ${e.time}</span>
          <span class="h-text">${e.text || '<em style="opacity:0.4">sem descrição</em>'}</span>
        </div>`
      ).join('') || '<div style="color:var(--muted);font-size:0.8rem;padding:0.3rem 0">Nenhuma</div>';

      div.innerHTML = `
        <div class="history-day-header" onclick="toggleDay(${idx})">
          <span class="history-day-date">${day.dateLabel}</span>
          <div class="history-badges">
            <span class="badge rec">😤 ${day.rec.length}</span>
            <span class="badge agr">🙏 ${day.agr.length}</span>
          </div>
          <span class="chevron">▾</span>
        </div>
        <div class="history-day-body">
          <div class="history-cols">
            <div>
              <div class="history-col-title rec">Reclamações</div>
              ${recRows}
            </div>
            <div>
              <div class="history-col-title agr">Agradecimentos</div>
              ${agrRows}
            </div>
          </div>
          <button class="del-day-btn" onclick="deleteDay(${idx})">🗑 Apagar este dia</button>
        </div>
      `;

      el.appendChild(div);
    });
  }

  function toggleDay(idx) {
    const el = document.getElementById('hday-' + idx);
    el.classList.toggle('open');
  }

  function deleteDay(idx) {
    if (!confirm('Apagar o registro deste dia?')) return;
    history.splice(idx, 1);
    saveHistory();
    renderHistory();
  }

  render();
</script>
</body>
</html>
